<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- maximum-scale=1/user-scalable=no stop the browser's native pinch-zoom
         from fighting with the app's own zoom controls on the image canvas. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Pinning an actual embedded webfont (rather than the generic
         system-ui/sans-serif keywords) is what makes the typeface consistent
         across browsers — those generic families are aliases that a browser's
         own font settings (e.g. Vivaldi's Settings > Appearance > Fonts) are
         free to substitute, but a named, loaded font isn't. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Sean's RAW Editor</title>
  </head>
  <body class="bg-neutral-950 text-neutral-100">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
